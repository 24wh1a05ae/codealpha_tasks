<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="background"></div>

    <div class="container">

        <!-- Playlist -->
        <aside class="playlist">

            <h2><i class="fa-solid fa-music"></i> Music Playlist</h2>
            <p class="quote">
                "Where words fail, music speaks"</p>
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search" placeholder="Search Songs...">
            </div>

            <ul id="playlist"></ul>

        </aside>

        <!-- Player -->
        <section class="player">

            <div class="album">

                <img id="cover" src="image2/song1.jpg">

                <div class="glow-ring"></div>

            </div>

            <h1 id="title">Beleiver</h1>

            <h3 id="artist">Imagine Dragons</h3>

            <!-- Progress -->
            <div class="progress-container">

                <span id="current">0:00</span>

                <input
                    type="range"
                    id="progress"
                    min="0"
                    max="100"
                    value="0">

                <span id="duration">0:00</span>

            </div>

            <!-- Controls -->
            <div class="controls">

                <button id="shuffle">
                    <i class="fa-solid fa-shuffle"></i>
                </button>

                <button id="prev">
                    <i class="fa-solid fa-backward"></i>
                </button>

                <button id="play">
                    <i class="fa-solid fa-play"></i>
                </button>

                <button id="next">
                    <i class="fa-solid fa-forward"></i>
                </button>

                <button id="repeat">
                    <i class="fa-solid fa-repeat"></i>
                </button>

            </div>

            <!-- Volume -->

            <div class="volume">

                <i class="fa-solid fa-volume-low"></i>

                <input
                    type="range"
                    id="volume"
                    min="0"
                    max="100"
                    value="100">

                <span id="volumeValue">100%</span>

            </div>

            <!-- Visualizer -->

            <div class="visualizer">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

        </section>

    </div>

    <audio id="audio"></audio>

    <script src="script.js"></script>

</body>

</html>
